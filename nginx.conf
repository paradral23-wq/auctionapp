server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name my-auction-super.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/my-auction-super.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-auction-super.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # React SPA — без кеша для index.html
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Статика — долгий кеш (хеш в имени файла)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Backend API
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, x-tg-init-data" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Видео
    location /videos/ {
        alias /videos/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=86400";
    }
}
